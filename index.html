<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    color:white;
}

/* PAGES */

.page{
    width:100%;
    height:100vh;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    position:absolute;
    top:0;
    left:0;
}

.active{
    display:flex;
}

/* HOME PAGE */

.home h1{
    font-size:60px;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:0 0 25px #ff1493;
    }
}

.home p{
    font-size:24px;
    max-width:700px;
    line-height:1.7;
}

/* PHOTO PAGE */

.photo-gallery{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:30px;
}

.photo-gallery img{
    width:220px;
    height:300px;
    object-fit:cover;
    border-radius:25px;
    border:5px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.5);
    transition:0.4s;
}

.photo-gallery img:hover{
    transform:scale(1.05);
}

/* CAKE */

.cake{
    position:relative;
    width:180px;
    margin-top:30px;
}

.layer{
    height:45px;
    border-radius:12px;
    margin-bottom:5px;
}

.layer1{
    background:#ffb6c1;
}

.layer2{
    background:#ff69b4;
    width:85%;
    margin:auto auto 5px;
}

.layer3{
    background:#ff1493;
    width:70%;
    margin:auto;
}

.candle{
    width:12px;
    height:45px;
    background:white;
    margin:auto;
    position:relative;
}

.flame{
    width:18px;
    height:18px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-18px;
    left:-3px;
    animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.2);
    }
}

/* BUTTONS */

.btn{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff1493;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.btn:hover{
    transform:scale(1.08);
}

/* MUSIC */

audio{
    position:fixed;
    bottom:10px;
    right:10px;
    z-index:999;
}

/* BUTTERFLY */

.butterfly{
    position:absolute;
    width:70px;
    animation:fly 14s linear infinite;
    z-index:-1;
}

@keyframes fly{
    0%{
        transform:translateY(100vh) translateX(0);
    }

    100%{
        transform:translateY(-120vh) translateX(200px);
    }
}

/* SPIDERMAN */

.spiderman{
    position:absolute;
    width:100px;
    animation:swing 12s linear infinite;
    z-index:-1;
}

@keyframes swing{
    0%{
        transform:translateY(-150px) translateX(0);
    }

    50%{
        transform:translateY(50vh) translateX(100px);
    }

    100%{
        transform:translateY(110vh) translateX(-100px);
    }
}

</style>
</head>

<body>

<!-- MUSIC -->

<audio autoplay loop controls>

<source src="music.mp3" type="audio/mp3">

</audio>

<!-- BUTTERFLIES -->

<img class="butterfly"
src="https://cdn-icons-png.flaticon.com/512/616/616490.png"
style="left:5%; animation-delay:0s;">

<img class="butterfly"
src="https://cdn-icons-png.flaticon.com/512/616/616490.png"
style="left:50%; animation-delay:4s;">

<img class="butterfly"
src="https://cdn-icons-png.flaticon.com/512/616/616490.png"
style="left:80%; animation-delay:8s;">

<!-- SPIDERMAN -->

<img class="spiderman"
src="https://cdn-icons-png.flaticon.com/512/2909/2909762.png"
style="left:20%; animation-delay:1s;">

<img class="spiderman"
src="https://cdn-icons-png.flaticon.com/512/2909/2909762.png"
style="left:70%; animation-delay:6s;">

<!-- PAGE 1 -->

<section class="page home active" id="page1">

<h1>🎉 Happy Birthday Madhu 🎉</h1>

<p>
You are the most beautiful part of my life 💖  
May your smile always shine like stars ✨
</p>

<button class="btn" onclick="nextPage(2)">
➡ Open Memories
</button>

</section>

<!-- PAGE 2 -->

<section class="page" id="page2">

<h1>📸 Beautiful Memories 📸</h1>

<div class="photo-gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

<button class="btn" onclick="nextPage(3)">
🎂 Next Surprise
</button>

</section>

<!-- PAGE 3 -->

<section class="page" id="page3">

<h1>🎂 Birthday Cake 🎂</h1>

<div class="cake">

<div class="candle">
<div class="flame"></div>
</div>

<div class="layer layer3"></div>
<div class="layer layer2"></div>
<div class="layer layer1"></div>

</div>

<h2 style="margin-top:30px;font-size:40px;">
💖 Happy Birthday Once Again 💖
</h2>

<button class="btn" onclick="nextPage(1)">
🏠 Back Home
</button>

</section>

<script>

function nextPage(pageNumber){

document.querySelectorAll(".page").forEach(page=>{
page.classList.remove("active");
});

document.getElementById("page"+pageNumber)
.classList.add("active");

}

</script>

</body>
</html>
